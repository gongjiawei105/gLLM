name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          BUCKET_NAME: "test-bucket"
          APP_AWS_ACCESS_KEY: "testing"
          APP_AWS_SECRET_KEY: "testing"
          APP_AWS_REGION: "us-east-1"
          AUTH_SECRET: "ci-test-secret-key-not-for-production"
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          HASH_ALGORITHM: "HS256"
          CHAINLIT_AUTH_SECRET: "ci-test-chainlit-secret"
        run: uv run pytest ../tests -x --ignore=../tests/test_integration.py --ignore=../tests/test_ai_quality.py --cov=src --cov-report=term-missing --cov-report=xml:../coverage.xml

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check and build
        run: npm run build
